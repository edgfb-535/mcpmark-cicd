name: Issue Management Automation

on:
  issues:
    types: [opened, labeled]

jobs:
  issue-triage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create required labels if they don't exist
        uses: actions/github-script@v7
        with:
          script: |
            const { github, context } = require('@actions/github');
            const issue = context.issue;

            const requiredLabels = [
              // Category labels
              { name: 'bug', color: 'd73a4a', description: 'Something isn't working' },
              { name: 'enhancement', color: 'a2eeef', description: 'New feature or request' },
              { name: 'epic', color: '6e5494', description: 'Large feature requiring multiple sub-tasks' },
              { name: 'maintenance', color: '009800', description: 'Maintenance and housekeeping tasks' },
              // Priority labels
              { name: 'priority-critical', color: 'b60205', description: 'Critical priority issue' },
              { name: 'priority-high', color: 'd93f0b', description: 'High priority issue' },
              { name: 'priority-medium', color: 'f9d0c4', description: 'Medium priority issue' },
              { name: 'priority-low', color: '0e8a16', description: 'Low priority issue' },
              // Status labels
              { name: 'needs-triage', color: 'fbca04', description: 'Needs to be reviewed by maintainers' },
              { name: 'needs-review', color: '0052cc', description: 'Awaiting review from maintainers' },
              { name: 'first-time-contributor', color: '1d76db', description: 'Issue created by first-time contributor' }
            ];

            for (const label of requiredLabels) {
              try {
                // Check if label exists
                await github.rest.issues.getLabel({
                  owner: issue.owner,
                  repo: issue.repo,
                  name: label.name
                });
                console.log(`Label ${label.name} already exists.`);
              } catch (error) {
                if (error.status === 404) {
                  // Create label if it doesn't exist
                  await github.rest.issues.createLabel({
                    owner: issue.owner,
                    repo: issue.repo,
                    name: label.name,
                    color: label.color,
                    description: label.description
                  });
                  console.log(`Created label ${label.name}.`);
                } else {
                  console.error(`Failed to check/create label ${label.name}:`, error);
                }
              }
            }

      - name: Triage issue
        uses: actions/github-script@v7
        with:
          script: |
            const { github, context } = require('@actions/github');
            const issue = context.issue;
            const title = context.payload.issue.title.toLowerCase();
            const body = context.payload.issue.body ? context.payload.issue.body.toLowerCase() : '';

            // Add needs-triage label initially
            await github.rest.issues.addLabels({
              owner: issue.owner,
              repo: issue.repo,
              issue_number: issue.number,
              labels: ['needs-triage']
            });

            // Assign category label based on title
            let categoryLabel = null;
            if (title.includes('bug')) {
              categoryLabel = 'bug';
            } else if (title.includes('epic')) {
              categoryLabel = 'epic';
            } else if (title.includes('maintenance')) {
              categoryLabel = 'maintenance';
            }

            if (categoryLabel) {
              await github.rest.issues.addLabels({
                owner: issue.owner,
                repo: issue.repo,
                issue_number: issue.number,
                labels: [categoryLabel]
              });
            }

            // Assign priority label (highest wins)
            let priorityLabel = 'priority-medium'; // default
            const priorityKeywords = {
              'priority-critical': ['critical', 'urgent', 'production', 'outage'],
              'priority-high': ['important', 'high', 'blocking'],
              'priority-low': ['low', 'nice-to-have', 'minor']
            };

            for (const [label, keywords] of Object.entries(priorityKeywords)) {
              if (keywords.some(keyword => title.includes(keyword) || body.includes(keyword))) {
                priorityLabel = label;
                break; // highest priority first
              }
            }

            await github.rest.issues.addLabels({
              owner: issue.owner,
              repo: issue.repo,
              issue_number: issue.number,
              labels: [priorityLabel]
            });

  task-breakdown:
    runs-on: ubuntu-latest
    needs: issue-triage
    if: contains(github.event.issue.labels.*.name, 'epic')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create epic subtasks
        uses: actions/github-script@v7
        with:
          script: |
            const { github, context } = require('@actions/github');
            const issue = context.issue;
            const originalTitle = context.payload.issue.title;
            const subtasks = [
              'Requirements Analysis',
              'Design and Architecture',
              'Implementation',
              'Testing and Documentation'
            ];

            const createdSubtasks = [];

            // Create each subtask
            for (let i = 0; i < subtasks.length; i++) {
              const taskNumber = i + 1;
              const subtaskTitle = `[SUBTASK] ${originalTitle} - Task ${taskNumber}: ${subtasks[i]}`;
              const subtaskBody = `Related to #${issue.number}`;

              try {
                const response = await github.rest.issues.create({
                  owner: issue.owner,
                  repo: issue.repo,
                  title: subtaskTitle,
                  body: subtaskBody,
                  labels: ['enhancement', 'needs-review']
                });
                createdSubtasks.push(response.data.number);
              } catch (error) {
                console.error(`Failed to create subtask ${taskNumber}:`, error);
              }
            }

            // Update parent issue with Epic Tasks checklist
            if (createdSubtasks.length > 0) {
              let parentBody = context.payload.issue.body || '';
              const epicTasksSection = `\n\n## Epic Tasks\n` + createdSubtasks.map(num => `- [ ] #${num}`).join('\n');
              parentBody += epicTasksSection;

              await github.rest.issues.update({
                owner: issue.owner,
                repo: issue.repo,
                issue_number: issue.number,
                body: parentBody
              });
            }

  auto-response:
    runs-on: ubuntu-latest
    needs: issue-triage
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Auto respond to issue
        uses: actions/github-script@v7
        with:
          script: |
            const { github, context } = require('@actions/github');
            const issue = context.issue;
            const author = context.payload.issue.user.login;
            const labels = context.payload.issue.labels.map(label => label.name);

            // Check if first-time contributor in this repo
            let isFirstTime = false;
            try {
              const response = await github.rest.issues.listForRepo({
                owner: issue.owner,
                repo: issue.repo,
                creator: author,
                state: 'all'
              });
              isFirstTime = response.data.length === 1;
            } catch (error) {
              console.error('Failed to check first-time contributor:', error);
            }

            if (isFirstTime) {
              await github.rest.issues.addLabels({
                owner: issue.owner,
                repo: issue.repo,
                issue_number: issue.number,
                labels: ['first-time-contributor']
              });

              const welcomeMessage = `Welcome to the project, @${author}! This is your first issue here. We appreciate your contribution and will get back to you as soon as possible.`;
              await github.rest.issues.createComment({
                owner: issue.owner,
                repo: issue.repo,
                issue_number: issue.number,
                body: welcomeMessage
              });
            }

            // Post response based on category label
            let responseMessage = '';
            if (labels.includes('bug')) {
              responseMessage = `Thank you for reporting this bug! Please review our [Bug Report Guidelines](https://github.com/${issue.owner}/${issue.repo}/blob/main/.github/ISSUE_TEMPLATE/bug_report.md) to ensure we have all the necessary information to resolve this issue.`;
            } else if (labels.includes('epic')) {
              responseMessage = `Thank you for submitting this epic! Please review our [Feature Request Process](https://github.com/${issue.owner}/${issue.repo}/blob/main/.github/ISSUE_TEMPLATE/feature_request.md) to understand how we handle large feature requests.`;
            } else if (labels.includes('maintenance')) {
              responseMessage = `Thank you for submitting this maintenance task! Please review our [Maintenance Guidelines](https://github.com/${issue.owner}/${issue.repo}/blob/main/.github/ISSUE_TEMPLATE/maintenance_report.md) to ensure we have all the necessary details.`;
            }

            if (responseMessage) {
              await github.rest.issues.createComment({
                owner: issue.owner,
                repo: issue.repo,
                issue_number: issue.number,
                body: responseMessage
              });
            }

            // Set milestone for high/critical issues
            if (labels.includes('priority-high') || labels.includes('priority-critical')) {
              try {
                // Get milestone ID for v1.0.0
                const milestones = await github.rest.issues.listMilestones({
                  owner: issue.owner,
                  repo: issue.repo,
                  state: 'open'
                });
                const v1Milestone = milestones.data.find(milestone => milestone.title === 'v1.0.0');
                if (v1Milestone) {
                  await github.rest.issues.update({
                    owner: issue.owner,
                    repo: issue.repo,
                    issue_number: issue.number,
                    milestone: v1Milestone.number
                  });
                } else {
                  console.error('Milestone v1.0.0 not found.');
                }
              } catch (error) {
                console.error('Failed to set milestone:', error);
              }
            }

            // Change status from needs-triage to needs-review
            if (labels.includes('needs-triage')) {
              await github.rest.issues.removeLabel({
                owner: issue.owner,
                repo: issue.repo,
                issue_number: issue.number,
                name: 'needs-triage'
              });
              await github.rest.issues.addLabels({
                owner: issue.owner,
                repo: issue.repo,
                issue_number: issue.number,
                labels: ['needs-review']
              });
            }